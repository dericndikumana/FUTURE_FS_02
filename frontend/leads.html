<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leads | LeadCRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ── YOUR ORIGINAL DESIGN STYLES ── */
    [data-theme="light"] { --bg:#f1f5f9; --surface:#ffffff; --surface2:#f8fafc; --text:#0f172a; --text2:#475569; --muted:#94a3b8; --border:#e2e8f0; }
    [data-theme="dark"]  { --bg:#0f172a; --surface:#1e293b; --surface2:#162032; --text:#f1f5f9; --text2:#94a3b8; --muted:#64748b; --border:#334155; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background 0.3s,color 0.3s;}

    /* SIDEBAR */
    .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.3s,background 0.3s;}
    .sidebar-logo{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:0.75rem;border-bottom:1px solid var(--border);height:64px;}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-size:0.95rem;flex-shrink:0;}
    .logo-text{font-size:1.1rem;font-weight:800;color:var(--text);}
    .logo-text span{color:#6366f1;}
    .sidebar-nav{padding:0.75rem;flex:1;}
    .nav-section{font-size:0.62rem;font-weight:700;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 0.75rem;margin-top:0.5rem;}
    .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.75rem;color:var(--text2);text-decoration:none;font-size:0.88rem;font-weight:600;border-radius:10px;transition:all 0.2s;margin-bottom:2px;}
    .nav-item:hover{background:var(--surface2);color:#6366f1;}
    .nav-item.active{background:#e0e7ff;color:#6366f1;}
    [data-theme="dark"] .nav-item.active{background:rgba(99,102,241,0.15);}
    .nav-item i{width:16px;text-align:center;font-size:0.88rem;}
    .sidebar-bottom{padding:1rem;border-top:1px solid var(--border);}
    .admin-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;}
    .admin-av{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:0.88rem;flex-shrink:0;}
    .admin-name{font-size:0.83rem;font-weight:700;color:var(--text);}
    .admin-role{font-size:0.68rem;color:var(--muted);}
    .logout-btn{width:100%;padding:0.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all 0.2s;}
    .logout-btn:hover{background:#fee2e2;color:#ef4444;border-color:rgba(239,68,68,0.25);}

    /* TOPBAR */
    .topbar{position:fixed;top:0;left:240px;right:0;height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;transition:background 0.3s,left 0.3s;}
    .topbar-left{display:flex;align-items:center;gap:1rem;}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;color:var(--text2);font-size:1.2rem;padding:0.25rem;}
    .topbar-title{font-size:1rem;font-weight:700;color:var(--text);}
    .topbar-right{display:flex;align-items:center;gap:0.75rem;}
    .theme-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:0.92rem;transition:all 0.2s;}
    .theme-btn:hover{color:#6366f1;background:#e0e7ff;}
    [data-theme="dark"] .theme-btn:hover{background:rgba(99,102,241,0.15);}
    .add-btn{display:flex;align-items:center;gap:0.5rem;padding:0.6rem 1.1rem;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(99,102,241,0.3);}
    .add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,0.4);}

    /* MAIN */
    .main{margin-left:240px;padding-top:64px;flex:1;min-width:0;transition:margin-left 0.3s;}
    .inner{padding:1.5rem;}
    .page-title{font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:0.25rem;}
    .page-sub{font-size:0.88rem;color:var(--text2);margin-bottom:1.5rem;font-weight:500;}

    /* TOOLBAR */
    .toolbar{display:flex;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:180px;}
    .search-wrap i{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;pointer-events:none;}
    .search-input{width:100%;padding:0.7rem 1rem 0.7rem 2.3rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.86rem;background:var(--surface);color:var(--text);outline:none;transition:all 0.2s;}
    .search-input::placeholder{color:var(--muted);}
    .search-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
    .filter-sel{padding:0.7rem 0.9rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.86rem;background:var(--surface);color:var(--text);outline:none;cursor:pointer;font-weight:500;}

    /* TABLE CARD */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;min-width:580px;}
    th{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:0.9rem 1rem;border-bottom:1px solid var(--border);text-align:left;background:var(--surface2);}
    td{padding:0.9rem 1rem;border-bottom:1px solid var(--surface2);font-size:0.86rem;color:var(--text);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:var(--surface2);}
    .lead-name{font-weight:700;}
    .lead-email{font-size:0.76rem;color:var(--muted);margin-top:0.1rem;}
    .badge{display:inline-flex;padding:0.22rem 0.65rem;border-radius:100px;font-size:0.67rem;font-weight:700;text-transform:uppercase;white-space:nowrap;}
    .b-new{background:#e0e7ff;color:#6366f1;}       [data-theme="dark"] .b-new{background:rgba(99,102,241,0.2);}
    .b-contacted{background:#fef3c7;color:#f59e0b;} [data-theme="dark"] .b-contacted{background:rgba(245,158,11,0.2);}
    .b-converted{background:#d1fae5;color:#10b981;}  [data-theme="dark"] .b-converted{background:rgba(16,185,129,0.2);}
    .b-lost{background:#fee2e2;color:#ef4444;}       [data-theme="dark"] .b-lost{background:rgba(239,68,68,0.2);}
    .src-tag{background:var(--surface2);color:var(--muted);padding:0.2rem 0.5rem;border-radius:5px;font-size:0.72rem;border:1px solid var(--border);font-weight:600;}
    .actions{display:flex;gap:0.4rem;}
    .action-btn{width:29px;height:29px;border:1px solid var(--border);background:var(--surface2);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.2s;font-size:0.76rem;}
    .action-btn:hover{background:#e0e7ff;color:#6366f1;border-color:rgba(99,102,241,0.3);}
    .action-btn.del:hover{background:#fee2e2;color:#ef4444;border-color:rgba(239,68,68,0.3);}
    .empty{text-align:center;padding:4rem;color:var(--muted);}
    .empty i{font-size:3rem;margin-bottom:1rem;display:block;opacity:0.2;}

    /* MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px);}
    .modal-bg.open{display:flex;}
    .modal{background:var(--surface);border-radius:20px;padding:clamp(1.5rem,4vw,2rem);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);border:1px solid var(--border);}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .modal-title{font-size:1.1rem;font-weight:800;color:var(--text);}
    .close-btn{width:30px;height:30px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.95rem;transition:all 0.2s;}
    .close-btn:hover{background:#fee2e2;color:#ef4444;}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:0.78rem;font-weight:700;margin-bottom:0.4rem;color:var(--text);}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:0.75rem;border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;color:var(--text);background:var(--surface2);outline:none;transition:all 0.2s;font-weight:500;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#6366f1;background:var(--surface);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .submit-btn{width:100%;padding:0.875rem;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;}
    .submit-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.35);}

    /* DETAIL MODAL EXTRAS */
    .detail-section{margin-bottom:1.5rem;}
    .detail-label{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
    .detail-item{background:var(--surface2);border-radius:10px;padding:0.75rem;border:1px solid var(--border);}
    .detail-item-label{font-size:0.68rem;color:var(--muted);margin-bottom:0.2rem;font-weight:600;}
    .detail-item-value{font-weight:700;font-size:0.88rem;color:var(--text);}
    .notes-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;max-height:160px;overflow-y:auto;}
    .note-item{background:var(--surface2);border-radius:9px;padding:0.75rem;font-size:0.83rem;color:var(--text);border:1px solid var(--border);}
    .note-date{font-size:0.68rem;color:var(--muted);margin-top:0.25rem;}
    .note-row{display:flex;gap:0.5rem;}
    .note-row input{flex:1;padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.84rem;color:var(--text);background:var(--surface2);outline:none;}
    .note-row input:focus{border-color:#6366f1;}
    .note-add-btn{padding:0.65rem 1rem;background:#6366f1;color:white;border:none;border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
    .note-add-btn:hover{background:#4f46e5;}
    .status-sel{width:100%;padding:0.7rem 0.9rem;border:1.5px solid var(--border);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;background:var(--surface2);color:var(--text);outline:none;cursor:pointer;font-weight:600;}

    /* TOAST */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:0.75rem 1.25rem;border-radius:12px;font-size:0.84rem;font-weight:700;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:300px;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.ok{background:#10b981;color:white;}
    .toast.err{background:#ef4444;color:white;}

    /* OVERLAY */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;}
    .overlay.show{display:block;}

    /* RESPONSIVE */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .topbar{left:0;} .main{margin-left:0;} .menu-btn{display:block;}
      .form-row{grid-template-columns:1fr;}
      .detail-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
    <div class="logo-text">Lead<span>CRM</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="leads.html" class="nav-item active"><i class="fas fa-users"></i> All Leads</a>
    <div class="nav-section">Account</div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="admin-row">
      <div class="admin-av">D</div>
      <div>
        <div class="admin-name">Deric Ndikumana</div>
        <div class="admin-role">Admin · FIT/MAR26/FS14315</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
  </div>
</aside>

<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <span class="topbar-title">All Leads</span>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()" title="Switch theme"><i id="theme-icon" class="fas fa-moon"></i></button>
    <button class="add-btn" onclick="openAdd()"><i class="fas fa-plus"></i> <span>Add Lead</span></button>
  </div>
</div>

<main class="main">
  <div class="inner">
    <div class="page-title">All Leads</div>
    <div class="page-sub">Manage and track all your client leads</div>

    <div class="toolbar">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" id="search" placeholder="Search by name..." oninput="filter()"/>
      </div>
      <select class="filter-sel" id="f-status" onchange="filter()">
        <option value="">All Status</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="converted">Converted</option>
        <option value="lost">Lost</option>
      </select>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Lead</th>
              <th>Phone</th>
              <th>Source</th>
              <th>Status</th>
              <th>Follow-Up</th>
              <th>Added</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="leads-body">
            <tr><td colspan="7"><div class="empty"><i class="fas fa-spinner fa-spin"></i></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="modal-bg" id="form-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Add New Lead</div>
      <button class="close-btn" onclick="closeModal('form-modal')"><i class="fas fa-times"></i></button>
    </div>
    <form id="lead-form" onsubmit="submitLead(event)">
      <input type="hidden" id="lead-id"/>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" id="f-name" placeholder="e.g., John Doe" required/></div>
        <div class="form-group"><label>Email *</label><input type="email" id="f-email" placeholder="e.g., john@example.com" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input type="text" id="f-phone" placeholder="e.g., +250 788 123 456"/></div>
        <div class="form-group">
          <label>Source</label>
          <select id="f-source-sel">
            <option>Website</option><option>LinkedIn</option><option>Referral</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="f-status-sel">
            <option value="new">New</option><option value="contacted">Contacted</option>
            <option value="converted">Converted</option><option value="lost">Lost</option>
          </select>
        </div>
        <div class="form-group"><label>Follow-Up Date</label><input type="date" id="f-followup"/></div>
      </div>
      <button type="submit" class="submit-btn" id="form-btn">Add Lead</button>
    </form>
  </div>
</div>

<div class="modal-bg" id="detail-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="d-name-title">Lead Details</div>
      <button class="close-btn" onclick="closeModal('detail-modal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="detail-section">
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-item-label">Email</div><div class="detail-item-value" id="d-email"></div></div>
        <div class="detail-item"><div class="detail-item-label">Phone</div><div class="detail-item-value" id="d-phone"></div></div>
        <div class="detail-item"><div class="detail-item-label">Source</div><div class="detail-item-value" id="d-source"></div></div>
        <div class="detail-item"><div class="detail-item-label">Follow-Up</div><div class="detail-item-value" id="d-followup"></div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Status</div>
      <select class="status-sel" id="d-status" onchange="updateStatus()"></select>
    </div>
    <div class="detail-section">
      <div class="detail-label">Notes</div>
      <div class="notes-list" id="notes-list"></div>
      <div class="note-row">
        <input type="text" id="note-input" placeholder="Add a note..."/>
        <button class="note-add-btn" onclick="addNote()">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5001/api';
  const token = localStorage.getItem('crm_token');
  if (!token) window.location.href = 'index.html';
  const H = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

  let allLeads = [];
  let currentId = null;

  // Responsive UI
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function toast(msg, type) { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast show ${type}`; setTimeout(() => t.classList.remove('show'), 3000); }

  // Theme Logic
  function toggleTheme() {
    const curr = document.documentElement.getAttribute('data-theme');
    const next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('crm_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }
  const savedTheme = localStorage.getItem('crm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

  function logout() { localStorage.removeItem('crm_token'); window.location.href = 'index.html'; }

  // Core Data Functions
  async function loadLeads() {
    try {
      const res = await fetch(`${API}/leads`, { headers: H });
      if (res.status === 401) return logout();
      allLeads = await res.json();
      render(allLeads);
    } catch { toast('Connection error', 'err'); }
  }

  function badge(s) {
    const map = { new:'b-new', contacted:'b-contacted', converted:'b-converted', lost:'b-lost' };
    return `<span class="badge ${map[s]||'b-new'}">${s.toUpperCase()}</span>`;
  }

  function render(list) {
    const tbody = document.getElementById('leads-body');
    if(!list.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty">No leads found.</div></td></tr>'; return; }
    tbody.innerHTML = list.map(l => `
      <tr>
        <td><div class="lead-name">${l.name}</div><div class="lead-email">${l.email}</div></td>
        <td>${l.phone || '—'}</td>
        <td><span class="src-tag">${l.source}</span></td>
        <td>${badge(l.status)}</td>
        <td>${l.followUpDate ? new Date(l.followUpDate).toLocaleDateString() : '—'}</td>
        <td>${new Date(l.created_at).toLocaleDateString()}</td>
        <td>
          <div class="actions">
            <button class="action-btn" onclick="openDetail(${l.id})"><i class="fas fa-eye"></i></button>
            <button class="action-btn" onclick="openEdit(${l.id})"><i class="fas fa-pencil-alt"></i></button>
            <button class="action-btn del" onclick="deleteLead(${l.id})"><i class="fas fa-trash"></i></button>
          </div>
        </td>
      </tr>`).join('');
  }

  function filter() {
    const s = document.getElementById('search').value.toLowerCase();
    const st = document.getElementById('f-status').value;
    const filtered = allLeads.filter(l => 
      (l.name.toLowerCase().includes(s) || l.email.toLowerCase().includes(s)) &&
      (st === '' || l.status === st)
    );
    render(filtered);
  }

  function openAdd() {
    currentId = null;
    document.getElementById('modal-title').textContent = 'Add New Lead';
    document.getElementById('form-btn').textContent = 'Add Lead';
    document.getElementById('lead-form').reset();
    document.getElementById('form-modal').classList.add('open');
  }

  function openEdit(id) {
    const l = allLeads.find(x => x.id == id);
    if(!l) return;
    currentId = id;
    document.getElementById('modal-title').textContent = 'Edit Lead';
    document.getElementById('form-btn').textContent = 'Save Changes';
    document.getElementById('f-name').value = l.name;
    document.getElementById('f-email').value = l.email;
    document.getElementById('f-phone').value = l.phone || '';
    document.getElementById('f-source-sel').value = l.source;
    document.getElementById('f-status-sel').value = l.status;
    document.getElementById('form-modal').classList.add('open');
  }

  // --- UPDATED SUBMISSION LOGIC WITH VALIDATION ---
  async function submitLead(e) {
    e.preventDefault();
    
    const data = {
      name: document.getElementById('f-name').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      source: document.getElementById('f-source-sel').value,
      status: document.getElementById('f-status-sel').value,
      followUpDate: document.getElementById('f-followup').value || null
    };

    // Frontend Email Regex Validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(data.email)) {
      return toast('Please enter a valid email address', 'err');
    }

    const method = currentId ? 'PUT' : 'POST';
    const url = currentId ? `${API}/leads/${currentId}` : `${API}/leads`;

    try {
      const res = await fetch(url, { 
        method, 
        headers: H, 
        body: JSON.stringify(data) 
      });

      const result = await res.json();

      if (!res.ok) {
        // Catches duplicate email error or other backend validation errors
        return toast(result.message || 'Action failed', 'err');
      }

      closeModal('form-modal');
      loadLeads();
      toast(currentId ? 'Lead Updated' : 'Lead Added', 'ok');
    } catch (err) {
      toast('Server unreachable. Try again.', 'err');
    }
  }

  async function deleteLead(id) {
    if(!confirm('Delete this lead?')) return;
    const res = await fetch(`${API}/leads/${id}`, { method:'DELETE', headers:H });
    if(res.ok) { loadLeads(); toast('Deleted', 'ok'); }
  }

  function openDetail(id) {
    const l = allLeads.find(x => x.id == id);
    if(!l) return;
    currentId = id;
    document.getElementById('d-name-title').textContent = l.name;
    document.getElementById('d-email').textContent = l.email;
    document.getElementById('d-phone').textContent = l.phone || '—';
    document.getElementById('d-source').textContent = l.source;
    document.getElementById('d-followup').textContent = l.followUpDate ? new Date(l.followUpDate).toLocaleDateString() : '—';
    
    const sel = document.getElementById('d-status');
    sel.innerHTML = ['new','contacted','converted','lost']
      .map(s => `<option value="${s}" ${l.status===s?'selected':''}>${s.toUpperCase()}</option>`).join('');
    
    renderNotes(l.notes);
    document.getElementById('detail-modal').classList.add('open');
  }

  async function updateStatus() {
    const status = document.getElementById('d-status').value;
    await fetch(`${API}/leads/${currentId}`, { method:'PUT', headers:H, body:JSON.stringify({ status }) });
    loadLeads();
    toast('Status Updated', 'ok');
  }

  async function addNote() {
    const text = document.getElementById('note-input').value.trim();
    if(!text) return;
    const res = await fetch(`${API}/leads/${currentId}/notes`, { method:'POST', headers:H, body:JSON.stringify({ text }) });
    const updated = await res.json();
    renderNotes(updated.notes);
    document.getElementById('note-input').value = '';
    loadLeads();
  }

  function renderNotes(notes) {
    const list = document.getElementById('notes-list');
    list.innerHTML = (notes || []).map(n => `
      <div class="note-item">
        <div>${n.text}</div>
        <div class="note-date">${new Date(n.createdAt).toLocaleString()}</div>
      </div>`).join('');
  }

  loadLeads();
</script>
</body>
</html>
