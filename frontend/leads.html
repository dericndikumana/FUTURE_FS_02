<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leads | LeadCRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root { --primary:#6366f1; --primary-dark:#4f46e5; --primary-light:#e0e7ff; --success:#10b981; --success-light:#d1fae5; --warning:#f59e0b; --warning-light:#fef3c7; --danger:#ef4444; --danger-light:#fee2e2; --font:'Plus Jakarta Sans',sans-serif; --sidebar-w:250px; --topbar-h:64px; }
    [data-theme="light"] { --bg:#f1f5f9; --surface:#ffffff; --surface2:#f8fafc; --text:#0f172a; --text2:#475569; --muted:#94a3b8; --border:#e2e8f0; --shadow:0 2px 12px rgba(0,0,0,0.06); }
    [data-theme="dark"]  { --bg:#0f172a; --surface:#1e293b; --surface2:#162032; --text:#f1f5f9; --text2:#94a3b8; --muted:#64748b; --border:#334155; --shadow:0 2px 12px rgba(0,0,0,0.4); }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background 0.3s,color 0.3s;}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform 0.3s,background 0.3s;}
    .sidebar-logo{padding:1.25rem 1.5rem;display:flex;align-items:center;gap:0.75rem;border-bottom:1px solid var(--border);height:var(--topbar-h);}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:1rem;flex-shrink:0;}
    .logo-text{font-size:1.15rem;font-weight:800;color:var(--text);}
    .logo-text span{color:var(--primary);}
    .sidebar-nav{padding:1rem 0.75rem;flex:1;overflow-y:auto;}
    .nav-label{font-size:0.65rem;font-weight:700;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 0.75rem;margin-top:0.75rem;}
    .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 0.75rem;color:var(--text2);text-decoration:none;font-size:0.88rem;font-weight:600;border-radius:10px;transition:all 0.2s;margin-bottom:2px;}
    .nav-item:hover{background:var(--surface2);color:var(--primary);}
    .nav-item.active{background:var(--primary-light);color:var(--primary);}
    [data-theme="dark"] .nav-item.active{background:rgba(99,102,241,0.15);}
    .nav-item i{width:18px;text-align:center;font-size:0.9rem;}
    .sidebar-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);}
    .admin-info{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;}
    .admin-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:0.9rem;flex-shrink:0;}
    .admin-name{font-size:0.85rem;font-weight:700;color:var(--text);}
    .admin-role{font-size:0.7rem;color:var(--muted);}
    .btn-logout{width:100%;padding:0.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:var(--font);font-size:0.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem;transition:all 0.2s;}
    .btn-logout:hover{background:var(--danger-light);color:var(--danger);border-color:rgba(239,68,68,0.2);}

    /* TOPBAR */
    .topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:100;transition:background 0.3s,left 0.3s;}
    .topbar-left{display:flex;align-items:center;gap:1rem;}
    .menu-btn{display:none;width:38px;height:38px;background:transparent;border:none;cursor:pointer;color:var(--text2);font-size:1.2rem;border-radius:8px;align-items:center;justify-content:center;transition:all 0.2s;}
    .menu-btn:hover{background:var(--surface2);color:var(--primary);}
    .topbar-title{font-size:1rem;font-weight:700;color:var(--text);}
    .topbar-right{display:flex;align-items:center;gap:0.75rem;}
    .theme-btn{width:38px;height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:0.95rem;transition:all 0.2s;}
    .theme-btn:hover{color:var(--primary);background:var(--primary-light);}
    .btn-add-top{display:flex;align-items:center;gap:0.5rem;padding:0.6rem 1.1rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border:none;border-radius:10px;font-family:var(--font);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(99,102,241,0.3);}
    .btn-add-top:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,0.4);}

    /* MAIN */
    .main{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);flex:1;min-width:0;transition:margin-left 0.3s;}
    .main-inner{padding:1.5rem;}

    /* TOOLBAR */
    .toolbar{display:flex;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
    .search-wrap{position:relative;flex:1;min-width:180px;}
    .search-wrap i{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;pointer-events:none;}
    .search-input{width:100%;padding:0.7rem 1rem 0.7rem 2.3rem;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:0.86rem;background:var(--surface);color:var(--text);outline:none;transition:all 0.2s;font-weight:500;}
    .search-input::placeholder{color:var(--muted);}
    .search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
    .filter-select{padding:0.7rem 0.9rem;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:0.86rem;background:var(--surface);color:var(--text);outline:none;cursor:pointer;font-weight:500;}

    /* TABLE */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:background 0.3s;}
    .table-wrap{overflow-x:auto;}
    .leads-table{width:100%;border-collapse:collapse;min-width:600px;}
    .leads-table th{font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:0.9rem 1rem;border-bottom:1px solid var(--border);text-align:left;background:var(--surface2);white-space:nowrap;}
    .leads-table td{padding:0.9rem 1rem;border-bottom:1px solid var(--surface2);font-size:0.86rem;color:var(--text);vertical-align:middle;}
    .leads-table tr:last-child td{border-bottom:none;}
    .leads-table tbody tr:hover td{background:var(--surface2);}
    .lead-name{font-weight:700;color:var(--text);}
    .lead-email{color:var(--muted);font-size:0.78rem;margin-top:0.1rem;}
    .badge{display:inline-flex;align-items:center;padding:0.22rem 0.65rem;border-radius:100px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;}
    .badge-new{background:var(--primary-light);color:var(--primary);}
    .badge-contacted{background:var(--warning-light);color:var(--warning);}
    .badge-converted{background:var(--success-light);color:var(--success);}
    .badge-lost{background:var(--danger-light);color:var(--danger);}
    [data-theme="dark"] .badge-new{background:rgba(99,102,241,0.2);}
    [data-theme="dark"] .badge-contacted{background:rgba(245,158,11,0.2);}
    [data-theme="dark"] .badge-converted{background:rgba(16,185,129,0.2);}
    [data-theme="dark"] .badge-lost{background:rgba(239,68,68,0.2);}
    .source-tag{background:var(--surface2);color:var(--muted);padding:0.2rem 0.5rem;border-radius:6px;font-size:0.72rem;border:1px solid var(--border);font-weight:600;}
    .action-btns{display:flex;gap:0.4rem;}
    .btn-icon{width:30px;height:30px;border:1px solid var(--border);background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.2s;font-size:0.78rem;}
    .btn-icon:hover{background:var(--primary-light);color:var(--primary);border-color:rgba(99,102,241,0.3);}
    .btn-icon.danger:hover{background:var(--danger-light);color:var(--danger);border-color:rgba(239,68,68,0.3);}
    .empty-state{text-align:center;padding:4rem;color:var(--muted);}
    .empty-state i{font-size:3rem;margin-bottom:1rem;display:block;opacity:0.2;}

    /* MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.6);z-index:500;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px);}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border-radius:20px;padding:clamp(1.5rem,4vw,2rem);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);border:1px solid var(--border);transition:background 0.3s;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .modal-title{font-size:1.15rem;font-weight:800;color:var(--text);}
    .btn-close{width:32px;height:32px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1rem;transition:all 0.2s;}
    .btn-close:hover{background:var(--danger-light);color:var(--danger);}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:0.8rem;font-weight:700;margin-bottom:0.4rem;color:var(--text);}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:0.75rem;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:0.88rem;color:var(--text);background:var(--surface2);outline:none;transition:all 0.2s;font-weight:500;}
    .form-group input::placeholder,.form-group textarea::placeholder{color:var(--muted);}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
    .form-group textarea{resize:vertical;min-height:80px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .btn-submit{width:100%;padding:0.875rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;border:none;border-radius:10px;font-family:var(--font);font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;}
    .btn-submit:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.35);}

    /* DETAIL */
    .detail-section{margin-bottom:1.5rem;}
    .detail-label{font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem;}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
    .detail-item{background:var(--surface2);border-radius:10px;padding:0.75rem;border:1px solid var(--border);}
    .detail-item-label{font-size:0.7rem;color:var(--muted);margin-bottom:0.2rem;font-weight:600;}
    .detail-item-value{font-weight:700;font-size:0.88rem;color:var(--text);}
    .notes-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;max-height:160px;overflow-y:auto;}
    .note-item{background:var(--surface2);border-radius:10px;padding:0.75rem;font-size:0.84rem;color:var(--text);border:1px solid var(--border);}
    .note-date{font-size:0.7rem;color:var(--muted);margin-top:0.25rem;}
    .note-input-row{display:flex;gap:0.5rem;}
    .note-input-row input{flex:1;padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:0.85rem;color:var(--text);background:var(--surface2);outline:none;font-weight:500;}
    .note-input-row input:focus{border-color:var(--primary);}
    .btn-add-note{padding:0.65rem 1rem;background:var(--primary);color:white;border:none;border-radius:10px;font-family:var(--font);font-size:0.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
    .btn-add-note:hover{background:var(--primary-dark);}
    .status-select{width:100%;padding:0.7rem 0.9rem;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:0.88rem;background:var(--surface2);color:var(--text);outline:none;cursor:pointer;font-weight:600;}
    .status-select:focus{border-color:var(--primary);}

    /* TOAST */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:var(--bg);padding:0.75rem 1.25rem;border-radius:12px;font-size:0.85rem;font-weight:700;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:300px;}
    .toast.show{transform:translateY(0);opacity:1;}
    .toast.success{background:var(--success);color:white;}
    .toast.error{background:var(--danger);color:white;}

    /* OVERLAY */
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;}
    .sidebar-overlay.show{display:block;}

    /* RESPONSIVE */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.open{transform:translateX(0);}
      .topbar{left:0;}
      .main{margin-left:0;}
      .menu-btn{display:flex;}
      .form-row{grid-template-columns:1fr;}
      .detail-grid{grid-template-columns:1fr;}
      .filter-select{flex:1;}
    }
    @media(max-width:480px){
      .main-inner{padding:1rem;}
      .toolbar{gap:0.5rem;}
      .btn-add-top span{display:none;}
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
    <div class="logo-text">Lead<span>CRM</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Main</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
    <a href="leads.html" class="nav-item active"><i class="fas fa-users"></i> All Leads</a>
    <div class="nav-label">Account</div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info">
      <div class="admin-avatar">D</div>
      <div><div class="admin-name">Deric Ndikumana</div><div class="admin-role">Admin · Future Interns</div></div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
  </div>
</aside>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <span class="topbar-title">All Leads</span>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme"><i id="theme-icon" class="fas fa-moon"></i></button>
    <button class="btn-add-top" onclick="openAddModal()"><i class="fas fa-plus"></i> <span>Add Lead</span></button>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="main-inner">
    <div class="toolbar">
      <div class="search-wrap"><i class="fas fa-search"></i><input type="text" class="search-input" id="search-input" placeholder="Search name or email..." oninput="filterLeads()"/></div>
      <select class="filter-select" id="filter-status" onchange="filterLeads()"><option value="">All Status</option><option value="new">New</option><option value="contacted">Contacted</option><option value="converted">Converted</option><option value="lost">Lost</option></select>
      <select class="filter-select" id="filter-source" onchange="filterLeads()"><option value="">All Sources</option><option value="Website">Website</option><option value="LinkedIn">LinkedIn</option><option value="Referral">Referral</option><option value="Other">Other</option></select>
    </div>
    <div class="table-card">
      <div class="table-wrap">
        <table class="leads-table">
          <thead><tr><th>Lead</th><th>Phone</th><th>Source</th><th>Status</th><th>Follow-Up</th><th>Added</th><th>Actions</th></tr></thead>
          <tbody id="leads-body"><tr><td colspan="7"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add New Lead</div>
      <button class="btn-close" onclick="closeModal('form-modal')"><i class="fas fa-times"></i></button>
    </div>
    <form id="lead-form" onsubmit="submitLead(event)">
      <input type="hidden" id="lead-id"/>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" id="f-name" placeholder="John Doe" required/></div>
        <div class="form-group"><label>Email *</label><input type="email" id="f-email" placeholder="john@example.com" required/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input type="text" id="f-phone" placeholder="+250 7XX XXX XXX"/></div>
        <div class="form-group"><label>Source</label><select id="f-source"><option>Website</option><option>LinkedIn</option><option>Referral</option><option>Other</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Status</label><select id="f-status"><option value="new">New</option><option value="contacted">Contacted</option><option value="converted">Converted</option><option value="lost">Lost</option></select></div>
        <div class="form-group"><label>Follow-Up Date</label><input type="date" id="f-followup"/></div>
      </div>
      <button type="submit" class="btn-submit" id="form-submit-btn"><i class="fas fa-plus"></i> Add Lead</button>
    </form>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detail-name">Lead Details</div>
      <button class="btn-close" onclick="closeModal('detail-modal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="detail-section">
      <div class="detail-label">Contact Info</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-item-label">Email</div><div class="detail-item-value" id="d-email">—</div></div>
        <div class="detail-item"><div class="detail-item-label">Phone</div><div class="detail-item-value" id="d-phone">—</div></div>
        <div class="detail-item"><div class="detail-item-label">Source</div><div class="detail-item-value" id="d-source">—</div></div>
        <div class="detail-item"><div class="detail-item-label">Follow-Up</div><div class="detail-item-value" id="d-followup">—</div></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Update Status</div>
      <select class="status-select" id="d-status" onchange="updateStatus()"></select>
    </div>
    <div class="detail-section">
      <div class="detail-label">Notes & Follow-Ups</div>
      <div class="notes-list" id="notes-list"></div>
      <div class="note-input-row">
        <input type="text" id="note-input" placeholder="Add a note or follow-up..."/>
        <button class="btn-add-note" onclick="addNote()"><i class="fas fa-plus"></i> Add</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:5000/api';
  const token = localStorage.getItem('crm_token');
  if (!token) window.location.href = 'index.html';
  const headers = { 'Authorization':'Bearer '+token, 'Content-Type':'application/json' };

  // Theme
  const savedTheme = localStorage.getItem('crm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  function toggleTheme() {
    const curr = document.documentElement.getAttribute('data-theme');
    const next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('crm_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }

  // Sidebar
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
  function logout() { localStorage.removeItem('crm_token'); window.location.href = 'index.html'; }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.className='toast', 3000);
  }
  function getBadge(s) {
    const m={new:'badge-new',contacted:'badge-contacted',converted:'badge-converted',lost:'badge-lost'};
    return `<span class="badge ${m[s]||'badge-new'}">${s}</span>`;
  }

  let allLeads=[], currentLeadId=null;

  async function loadLeads() {
    try {
      const res = await fetch(`${API}/leads`, {headers});
      if (res.status===401) { logout(); return; }
      allLeads = await res.json();
      renderLeads(allLeads);
    } catch { showToast('Failed to load leads','error'); }
  }

  function renderLeads(leads) {
    const tbody = document.getElementById('leads-body');
    if (!leads.length) { tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><i class="fas fa-users"></i><p>No leads found. Click "Add Lead" to get started!</p></div></td></tr>`; return; }
    tbody.innerHTML = leads.map(l=>`
      <tr>
        <td><div class="lead-name">${l.name}</div><div class="lead-email">${l.email}</div></td>
        <td style="color:var(--muted);font-size:0.83rem">${l.phone||'—'}</td>
        <td><span class="source-tag">${l.source}</span></td>
        <td>${getBadge(l.status)}</td>
        <td style="color:var(--muted);font-size:0.8rem">${l.followUpDate?new Date(l.followUpDate).toLocaleDateString():'—'}</td>
        <td style="color:var(--muted);font-size:0.8rem">${new Date(l.createdAt).toLocaleDateString()}</td>
        <td><div class="action-btns">
          <button class="btn-icon" onclick="openDetail('${l._id}')" title="View"><i class="fas fa-eye"></i></button>
          <button class="btn-icon" onclick="openEdit('${l._id}')" title="Edit"><i class="fas fa-pencil-alt"></i></button>
          <button class="btn-icon danger" onclick="deleteLead('${l._id}')" title="Delete"><i class="fas fa-trash"></i></button>
        </div></td>
      </tr>`).join('');
  }

  function filterLeads() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const s = document.getElementById('filter-status').value;
    const src = document.getElementById('filter-source').value;
    renderLeads(allLeads.filter(l=>(!q||l.name.toLowerCase().includes(q)||l.email.toLowerCase().includes(q))&&(!s||l.status===s)&&(!src||l.source===src)));
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent='Add New Lead';
    document.getElementById('form-submit-btn').innerHTML='<i class="fas fa-plus"></i> Add Lead';
    document.getElementById('lead-id').value='';
    document.getElementById('lead-form').reset();
    document.getElementById('form-modal').classList.add('open');
  }

  function openEdit(id) {
    const l=allLeads.find(x=>x._id===id); if(!l) return;
    document.getElementById('modal-title').textContent='Edit Lead';
    document.getElementById('form-submit-btn').innerHTML='<i class="fas fa-save"></i> Save Changes';
    document.getElementById('lead-id').value=l._id;
    document.getElementById('f-name').value=l.name;
    document.getElementById('f-email').value=l.email;
    document.getElementById('f-phone').value=l.phone||'';
    document.getElementById('f-source').value=l.source;
    document.getElementById('f-status').value=l.status;
    document.getElementById('f-followup').value=l.followUpDate?l.followUpDate.split('T')[0]:'';
    document.getElementById('form-modal').classList.add('open');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  async function submitLead(e) {
    e.preventDefault();
    const id=document.getElementById('lead-id').value;
    const body={name:document.getElementById('f-name').value,email:document.getElementById('f-email').value,phone:document.getElementById('f-phone').value,source:document.getElementById('f-source').value,status:document.getElementById('f-status').value,followUpDate:document.getElementById('f-followup').value||null};
    try {
      const res=await fetch(id?`${API}/leads/${id}`:`${API}/leads`,{method:id?'PUT':'POST',headers,body:JSON.stringify(body)});
      if(res.ok){showToast(id?'Lead updated!':'Lead added!');closeModal('form-modal');loadLeads();}
      else showToast('Something went wrong','error');
    } catch {showToast('Cannot connect to server','error');}
  }

  async function deleteLead(id) {
    if(!confirm('Delete this lead? This cannot be undone.')) return;
    try { await fetch(`${API}/leads/${id}`,{method:'DELETE',headers}); showToast('Lead deleted'); loadLeads(); }
    catch { showToast('Failed to delete','error'); }
  }

  function openDetail(id) {
    const l=allLeads.find(x=>x._id===id); if(!l) return;
    currentLeadId=id;
    document.getElementById('detail-name').textContent=l.name;
    document.getElementById('d-email').textContent=l.email;
    document.getElementById('d-phone').textContent=l.phone||'—';
    document.getElementById('d-source').textContent=l.source;
    document.getElementById('d-followup').textContent=l.followUpDate?new Date(l.followUpDate).toLocaleDateString():'—';
    const sel=document.getElementById('d-status');
    sel.innerHTML=['new','contacted','converted','lost'].map(s=>`<option value="${s}"${l.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('');
    const nl=document.getElementById('notes-list');
    nl.innerHTML=l.notes&&l.notes.length?l.notes.map(n=>`<div class="note-item">${n.text}<div class="note-date">${new Date(n.createdAt).toLocaleString()}</div></div>`).join(''):'<div style="color:var(--muted);font-size:0.84rem;text-align:center;padding:1rem">No notes yet</div>';
    document.getElementById('note-input').value='';
    document.getElementById('detail-modal').classList.add('open');
  }

  async function updateStatus() {
    if(!currentLeadId) return;
    const status=document.getElementById('d-status').value;
    try { await fetch(`${API}/leads/${currentLeadId}`,{method:'PUT',headers,body:JSON.stringify({status})}); showToast('Status updated!'); loadLeads(); }
    catch { showToast('Failed to update','error'); }
  }

  async function addNote() {
    const text=document.getElementById('note-input').value.trim();
    if(!text||!currentLeadId) return;
    try {
      const res=await fetch(`${API}/leads/${currentLeadId}/notes`,{method:'POST',headers,body:JSON.stringify({text})});
      if(res.ok){
        const updated=await res.json();
        document.getElementById('notes-list').innerHTML=updated.notes.map(n=>`<div class="note-item">${n.text}<div class="note-date">${new Date(n.createdAt).toLocaleString()}</div></div>`).join('');
        document.getElementById('note-input').value='';
        showToast('Note added!'); loadLeads();
      }
    } catch { showToast('Failed to add note','error'); }
  }

  document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
  loadLeads();
</script>
</body>
</html>
