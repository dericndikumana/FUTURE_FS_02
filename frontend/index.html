<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | LeadCRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    [data-theme="light"] { --bg:#f1f5f9; --surface:#ffffff; --text:#0f172a; --text2:#475569; --muted:#94a3b8; --border:#e2e8f0; --input:#f8fafc; --shadow:0 8px 32px rgba(99,102,241,0.10); }
    [data-theme="dark"]  { --bg:#0f172a; --surface:#1e293b; --text:#f1f5f9; --text2:#94a3b8; --muted:#64748b; --border:#334155; --input:#0f172a; --shadow:0 8px 32px rgba(0,0,0,0.5); }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;transition:background 0.3s;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 40%,rgba(99,102,241,0.08) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(16,185,129,0.05) 0%,transparent 50%);pointer-events:none;}
    .theme-btn{position:fixed;top:1.2rem;right:1.2rem;width:42px;height:42px;background:var(--surface);border:1.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:1rem;z-index:100;transition:all 0.3s;}
    .theme-btn:hover{color:#6366f1;transform:rotate(15deg) scale(1.1);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:clamp(1.75rem,5vw,2.5rem);width:100%;max-width:420px;box-shadow:var(--shadow);position:relative;z-index:1;transition:background 0.3s,border-color 0.3s;}
    .logo{display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem;}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-size:1.1rem;box-shadow:0 4px 14px rgba(99,102,241,0.35);}
    .logo-text{font-size:1.2rem;font-weight:800;color:var(--text);}
    .logo-text span{color:#6366f1;}
    h1{font-size:1.75rem;font-weight:800;color:var(--text);margin-bottom:0.4rem;}
    .subtitle{color:var(--text2);font-size:0.9rem;margin-bottom:2rem;font-weight:500;}
    .form-group{margin-bottom:1.1rem;}
    .form-group label{display:block;font-size:0.8rem;font-weight:700;color:var(--text);margin-bottom:0.5rem;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:0.9rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.88rem;pointer-events:none;}
    input{width:100%;padding:0.85rem 1rem 0.85rem 2.6rem;border:1.5px solid var(--border);border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:var(--text);background:var(--input);outline:none;transition:all 0.2s;font-weight:500;}
    input::placeholder{color:var(--muted);}
    input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.12);background:var(--surface);}
    .btn{width:100%;padding:0.95rem;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 4px 14px rgba(99,102,241,0.35);margin-top:0.5rem;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,0.45);}
    .btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}
    .error{display:none;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#ef4444;padding:0.75rem 1rem;border-radius:10px;font-size:0.83rem;font-weight:600;margin-bottom:1rem;text-align:center;}
    .footer-text{text-align:center;margin-top:1.5rem;font-size:0.78rem;color:var(--muted);font-family:'Space Mono',monospace;}
    .footer-text span{color:#6366f1;font-weight:700;}
  </style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()" title="Switch theme">
    <i id="theme-icon" class="fas fa-moon"></i>
  </button>

  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
      <div class="logo-text">Lead<span>CRM</span></div>
    </div>
    <h1>Welcome back 👋</h1>
    <p class="subtitle">Sign in to your admin dashboard</p>
    <div class="error" id="error-box">
      <i class="fas fa-exclamation-circle"></i>
      <span id="error-text"></span>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="admin@example.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn" id="login-btn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <p class="footer-text">Future Interns CRM &nbsp;·&nbsp; <span>Admin Only</span></p>
  </div>

<script>
  // Load saved theme
  const saved = localStorage.getItem('crm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-icon').className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';

  // Switch theme
  function toggleTheme() {
    const curr = document.documentElement.getAttribute('data-theme');
    const next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('crm_theme', next);
    document.getElementById('theme-icon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }

  // If already logged in, go to dashboard
  if (localStorage.getItem('crm_token')) window.location.href = 'dashboard.html';

  // Handle login
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const box = document.getElementById('error-box');
    const txt = document.getElementById('error-text');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
    btn.disabled = true;
    box.style.display = 'none';
    try {
      const res = await fetch('http://localhost:5001/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('crm_token', data.token);
        window.location.href = 'dashboard.html';
      } else {
        txt.textContent = data.message || 'Login failed.';
        box.style.display = 'block';
      }
    } catch {
      txt.textContent = 'Cannot connect. Make sure the server is running.';
      box.style.display = 'block';
    }
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    btn.disabled = false;
  });
</script>
</body>
</html>
